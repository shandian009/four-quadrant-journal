name: Build Windows portable

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-portable:
    runs-on: windows-latest
    timeout-minutes: 35
    steps:
      - name: Checkout build bundle
        uses: actions/checkout@v4

      - name: Extract source
        shell: pwsh
        run: Expand-Archive -Path FourQuadrantJournal-0.1.0-source.zip -DestinationPath app -Force

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Verify source
        working-directory: app
        run: npm run verify

      - name: Build portable executable
        working-directory: app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win portable --x64

      - name: Smoke test unpacked executable
        working-directory: app
        shell: pwsh
        run: |
          $env:PACKAGED_APP_PATH = (Resolve-Path "release/win-unpacked/四象日志.exe").Path
          npx playwright test tests/e2e/packaged-smoke.spec.ts

      - name: Smoke test single-file portable launcher
        working-directory: app
        shell: pwsh
        run: |
          $env:FOUR_QUADRANT_USER_DATA = Join-Path $env:RUNNER_TEMP "four-quadrant-portable-user-data"
          $env:E2E_EXIT_ON_CLOSE = "1"
          $env:ELECTRON_ENABLE_LOGGING = "1"
          $launcher = (Resolve-Path "release/FourQuadrantJournal-0.1.0-win-x64.exe").Path
          $launcherProcess = Start-Process -FilePath $launcher -PassThru
          $deadline = (Get-Date).AddSeconds(90)
          $visibleProcess = $null
          do {
            $visibleProcess = Get-Process -ErrorAction SilentlyContinue |
              Where-Object { $_.MainWindowTitle -eq "四象日志" } |
              Select-Object -First 1
            if ($visibleProcess) { break }
            Start-Sleep -Seconds 2
          } while ((Get-Date) -lt $deadline)

          if (-not $visibleProcess) {
            Write-Host "Portable launcher exited: $($launcherProcess.HasExited)"
            Get-CimInstance Win32_Process |
              Where-Object { $_.Name -match "FourQuadrant|四象|electron" } |
              Select-Object ProcessId, ParentProcessId, Name, CommandLine |
              Format-List
            throw "单文件绿色版在90秒内未显示四象日志窗口"
          }

          Write-Host "Visible window process: $($visibleProcess.Id) $($visibleProcess.MainWindowTitle)"
          Stop-Process -Id $visibleProcess.Id -Force -ErrorAction SilentlyContinue

      - name: Upload single-file portable executable
        uses: actions/upload-artifact@v4
        with:
          name: FourQuadrantJournal-0.1.0-portable
          path: app/release/FourQuadrantJournal-0.1.0-win-x64.exe
          if-no-files-found: error
          retention-days: 30

      - name: Upload unpacked green folder
        uses: actions/upload-artifact@v4
        with:
          name: FourQuadrantJournal-0.1.0-unpacked-green
          path: app/release/win-unpacked/**
          if-no-files-found: error
          retention-days: 30
