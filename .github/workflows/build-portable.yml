name: Build Windows portable

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-portable:
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Checkout build bundle
        uses: actions/checkout@v4

      - name: Extract source
        shell: pwsh
        run: Expand-Archive -Path FourQuadrantJournal-0.1.0-source.zip -DestinationPath app -Force

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Verify source
        working-directory: app
        run: npm run verify

      - name: Build portable executable
        working-directory: app
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
        run: npx electron-builder --win portable --x64

      - name: Smoke test packaged executable
        working-directory: app
        shell: pwsh
        run: |
          $env:PACKAGED_APP_PATH = (Resolve-Path "release/win-unpacked/四象日志.exe").Path
          npx playwright test tests/e2e/packaged-smoke.spec.ts

      - name: Upload portable executable
        uses: actions/upload-artifact@v4
        with:
          name: FourQuadrantJournal-0.1.0-portable
          path: app/release/*.exe
          if-no-files-found: error
          retention-days: 30
