name: Release Windows artifacts

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  release:
    if: github.event_name != 'pull_request' || startsWith(github.head_ref, 'release/')
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x
      - name: Cache Electron build downloads
        uses: actions/cache@v4
        with:
          path: |
            ~\AppData\Local\electron\Cache
            ~\AppData\Local\electron-builder\Cache
          key: windows-electron-${{ hashFiles('package-lock.json') }}
      - run: npm ci
      - name: Build native desktop host
        run: npm run build:desktop-host:win
      - name: Run full source verification once
        run: npm run verify
      - name: Build portable x64 application
        run: npx electron-builder --win portable --x64
      - name: Run unpacked E2E
        shell: pwsh
        run: |
          $env:PACKAGED_APP_PATH = (Resolve-Path 'release/win-unpacked/四象日志.exe').Path
          npx playwright test tests/e2e/packaged-smoke.spec.ts
      - name: Verify portable single-file launch
        shell: pwsh
        run: |
          $portable = (Get-ChildItem 'release/FourQuadrantJournal-*-win-x64.exe' | Select-Object -First 1).FullName
          ./scripts/verify-portable-launch.ps1 -PortablePath $portable
      - name: Run desktop-mode E2E
        shell: pwsh
        run: |
          $explorer = Get-Process explorer -ErrorAction SilentlyContinue
          if (-not $explorer) {
            Start-Process explorer.exe
            $deadline = (Get-Date).AddSeconds(20)
            do {
              Start-Sleep -Milliseconds 500
              $explorer = Get-Process explorer -ErrorAction SilentlyContinue
            } while (-not $explorer -and (Get-Date) -lt $deadline)
          }
          if (-not $explorer) { throw 'Windows Explorer desktop shell did not start' }
          $env:PACKAGED_APP_PATH = (Resolve-Path 'release/win-unpacked/四象日志.exe').Path
          npx playwright test tests/e2e/desktop-mode.spec.ts
      - name: Prepare green-folder artifact
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          $greenFolder = "release/FourQuadrantJournal-$version-green"
          New-Item -ItemType Directory -Path $greenFolder -Force | Out-Null
          Copy-Item -Path 'release/win-unpacked/*' -Destination $greenFolder -Recurse -Force
          $instructions = @'
          四象日志 Windows 绿色版使用说明

          1. 请先完整解压 ZIP，再运行文件夹中的“四象日志.exe”。
          2. 不要单独移动 EXE；应用依赖同一文件夹内的其他文件。
          3. 使用“嵌入桌面”进入桌面模式；需要设置或编辑时，点击右下角“恢复并编辑”。
          4. 若恢复控制条暂时不可见，请双击系统托盘中的“四象日志”，或按 Ctrl+Alt+J。
          '@
          $instructions | Set-Content -Path "$greenFolder/使用说明.txt" -Encoding utf8
          Compress-Archive -Path $greenFolder -DestinationPath "release/FourQuadrantJournal-$version-green-folder.zip" -Force
      - name: Upload verified Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: four-quadrant-journal-windows
          if-no-files-found: error
          path: |
            release/FourQuadrantJournal-*-green-folder.zip
            release/FourQuadrantJournal-*-win-x64.exe
            release/win-unpacked/**
